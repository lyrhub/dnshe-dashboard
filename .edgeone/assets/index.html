<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DNSHE 域名管理面板</title>
  <script type="module" crossorigin src="/assets/index-DupMyIwP.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-CnRl0AT3.css">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <h1>DNSHE 域名管理</h1>
      </div>
      <div class="header-right">
        <span id="quota-info" class="quota-badge">--</span>
        <button id="btn-settings" class="btn btn-ghost" title="API 设置">⚙️</button>
      </div>
    </header>

    <!-- Settings Modal -->
    <div id="modal-settings" class="modal hidden">
      <div class="modal-backdrop"></div>
      <div class="modal-content">
        <h2>API 设置</h2>
        <form id="form-settings">
          <label>API Key
            <input type="text" id="input-api-key" placeholder="cfsd_xxxxxxxxxx" autocomplete="off" />
          </label>
          <label>API Secret
            <input type="password" id="input-api-secret" placeholder="yyyyyyyyyyyy" autocomplete="off" />
          </label>
          <div class="modal-actions">
            <button type="button" id="btn-settings-cancel" class="btn btn-ghost">取消</button>
            <button type="submit" class="btn btn-primary">保存</button>
          </div>
        </form>
      </div>
    </div>

    <!-- Tabs -->
    <nav class="tabs">
      <button class="tab active" data-tab="subdomains">子域名</button>
      <button class="tab" data-tab="dns">DNS 记录</button>
      <button class="tab" data-tab="keys">API 密钥</button>
    </nav>

    <!-- Subdomains Tab -->
    <section id="tab-subdomains" class="tab-content active">
      <div class="toolbar">
        <input type="text" id="search-subdomains" placeholder="搜索域名..." class="input-search" />
        <select id="filter-status" class="select-filter">
          <option value="">全部状态</option>
          <option value="active">活跃</option>
          <option value="expired">已过期</option>
          <option value="suspended">已暂停</option>
        </select>
        <button id="btn-register" class="btn btn-primary">+ 注册子域名</button>
        <button id="btn-refresh-subdomains" class="btn btn-ghost">🔄 刷新</button>
      </div>
      <div id="subdomains-list" class="list-container">
        <p class="placeholder">请先配置 API 密钥</p>
      </div>
      <div id="subdomains-pagination" class="pagination"></div>
    </section>

    <!-- DNS Tab -->
    <section id="tab-dns" class="tab-content hidden">
      <div class="toolbar">
        <select id="dns-subdomain-select" class="select-filter">
          <option value="">选择子域名...</option>
        </select>
        <button id="btn-add-record" class="btn btn-primary" disabled>+ 添加记录</button>
      </div>
      <div id="dns-list" class="list-container">
        <p class="placeholder">请选择一个子域名查看 DNS 记录</p>
      </div>
    </section>

    <!-- API Keys Tab -->
    <section id="tab-keys" class="tab-content hidden">
      <div class="toolbar">
        <button id="btn-create-key" class="btn btn-primary">+ 创建密钥</button>
      </div>
      <div id="keys-list" class="list-container">
        <p class="placeholder">请先配置 API 密钥</p>
      </div>
    </section>

    <!-- Register Subdomain Modal -->
    <div id="modal-register" class="modal hidden">
      <div class="modal-backdrop"></div>
      <div class="modal-content">
        <h2>注册子域名</h2>
        <form id="form-register">
          <label>子域名前缀
            <input type="text" id="input-subdomain" placeholder="myapp" required />
          </label>
          <label>根域名
            <input type="text" id="input-rootdomain" placeholder="example.com" required />
          </label>
          <div class="modal-actions">
            <button type="button" class="btn btn-ghost modal-close">取消</button>
            <button type="submit" class="btn btn-primary">注册</button>
          </div>
        </form>
      </div>
    </div>

    <!-- Add DNS Record Modal -->
    <div id="modal-dns" class="modal hidden">
      <div class="modal-backdrop"></div>
      <div class="modal-content">
        <h2>添加 DNS 记录</h2>
        <form id="form-dns">
          <input type="hidden" id="dns-subdomain-id" />
          <label>记录类型
            <select id="dns-type" required>
              <option value="A">A</option>
              <option value="AAAA">AAAA</option>
              <option value="CNAME">CNAME</option>
              <option value="MX">MX</option>
              <option value="TXT">TXT</option>
              <option value="NS">NS</option>
              <option value="SRV">SRV</option>
              <option value="CAA">CAA</option>
            </select>
          </label>
          <label>记录名称 <small>（@ 或留空 = 子域名本身）</small>
            <input type="text" id="dns-name" placeholder="@" />
          </label>
          <label>记录值
            <input type="text" id="dns-content" placeholder="192.168.1.1" required />
          </label>
          <label>TTL
            <input type="number" id="dns-ttl" value="600" min="60" />
          </label>
          <div class="modal-actions">
            <button type="button" class="btn btn-ghost modal-close">取消</button>
            <button type="submit" class="btn btn-primary">添加</button>
          </div>
        </form>
      </div>
    </div>

    <!-- Auto Renew Panel -->
    <div id="auto-renew-panel" class="auto-renew-panel hidden">
      <div class="auto-renew-header">
        <h3>🔄 自动续期</h3>
        <div>
          <button id="btn-auto-renew" class="btn btn-sm btn-primary">重新执行</button>
          <button id="btn-close-renew-panel" class="btn btn-sm btn-ghost">关闭</button>
        </div>
      </div>
      <div id="auto-renew-status" class="auto-renew-status">等待中...</div>
      <div id="auto-renew-log" class="auto-renew-log"></div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast hidden"></div>
  </div>

</body>
</html>
